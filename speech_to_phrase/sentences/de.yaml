---
language: "de"

lists:
  color:
    - "weiss"
    - "schwarz"
    - "rot"
    - "orange"
    - "gelb"
    - "grün"
    - "blau"
    - "violett"
    - "braun"

expansion_rules:
  in_area: "((in|von) [der|dem] | (im|vom) | der) {area}"
  timer_set: "starte|setz[e]|[er]stell[e]"
  timer_cancel: "beende|stopp[e]|lösch[e]"

wildcards:
  - "todo_item"

data:
  # cancel
  - "vergiss es"
  - "stop"

  # date and time
  - "wie (spät|viel Uhr) (ist es|haben wir) [jetzt|gerade]"
  - "(welchen Tag|welches Datum) haben wir heute"
  - "(welcher Tag|welches Datum) ist heute"
  - "was ist heute für ein Tag"

  # weather
  - "wie ist das Wetter"
  - sentences:
      - "wie ist das Wetter (für|in) {name}"
    domains:
      - "weather"

  # lights (area)
  - "[alle|die|das] (Licht[er]|Lampen) (an|ein|aus)[schalten|machen|stellen]"
  - "[alle|die|das] (Licht[er]|Lampen) <in_area> (an|ein|aus)[schalten|machen|stellen]"
  - "(schalt|mach|stell)[e] [alle|die|das] (Licht[er]|Lampen) (an|ein|aus)"
  - "(schalt|mach|stell)[e] [alle|die|das] (Licht[er]|Lampen) <in_area> (an|ein|aus)"
  - "schalt[e] [den|die|das] {name} (an|ein|aus)"

  # lights (name)
  - sentences:
      - "(mach|stell)[e] [die] {name} Helligkeit auf {brightness} Prozent"
      - "(mach|stell)[e] [die] Helligkeit (von [der|dem]|vom|der) {name} auf {brightness} Prozent"
      - "(mach|stell)[e] [die] Helligkeit [hier] auf {brightness} Prozent"
      - "(mach|stell)[e] [die] Helligkeit <in_area> auf {brightness} Prozent"
      - "({area}|{name}) [Helligkeit] auf {brightness} Prozent [stellen]"
    domains:
      - "light"
    light_supports_brightness: true

  - sentences:
      - "(mach|stell)[e] [die] [Farbe (von [der|dem]|vom|der)] {name} auf {color}"
      - "(mach|stell)[e] [die] {name} [Farbe] auf {color}"
      - "{name} [Farbe] [auf] {color}"
          
      - "(mach|stell)[e] [die] Lichter [hier] auf {color}"
      - "(mach|stell)[e] [[die] Farbe von den] Lichtern [hier] auf {color}"
      - "(mach|stell)[e] [die] [Farbe von [den]] {area} Lichtern auf {color}"
      - "(mach|stell)[e] [die] {area} Lichter auf {color}"
      - "(mach|stell)[e] [die] Lichter <in_area> auf {color}"
    domains:
      - "light"
    light_supports_color: true

  # doors and windows
  - "(öffne|schließ[e]) [die] (Jalousien|Vorhänge|Fenster|Rollläden) <in_area>"
  - "(öffne|schließ[e]) [die] {area} (Jalousien|Vorhänge|Fenster|Rollläden)"
  - "[die] (Jalousien|Vorhänge|Fenster|Rollläden) <in_area> (öffnen|schließen)"
  - "[die] {area} (Jalousien|Vorhänge|Fenster|Rollläden) (öffnen|schließen)"
  - sentences:
      - "(öffne|schließ[e]) [den|die] {name}"
      - "(öffne|schließ[e]) [den|die] {name} <in_area>"
      - "ist [der|die|das] {name} (offen|geschlossen)"
    domains:
      - "cover"

  # # locks
  # - sentences:
  #     - "(lock|unlock) [the] {name}"
  #     - "is [the] {name} (locked|unlocked)"
  #   domains:
  #     - "lock"

  # generic on/off
  - sentences:
      - "(schalt|mach|stell)[e] [den|die|das] {name} (an|ein|aus)"
      - "(schalt|mach|stell)[e] (an|ein|aus) [den|die|das] {name}"
      - "(schalt|mach|stell)[e] [den|die|das] {name} (an|ein|aus) <in_area>"
      - "(schalt|mach|stell)[e] [den|die|das] {name} <in_area> (an|ein|aus)"
    domains:
      - "light"
      - "switch"
      - "fan"
      - "media_player"
      - "input_boolean"

  # scripts
  - sentences:
      - "(aktivier|start)[e] [das] {name} [Skript]"
      - "führ[e] [das] {name} [Skript] aus"
    domains:
      - "script"
  
  # scenes
  - sentences:
      - "aktivier[e] [die] {name} [Szene]"
      - "aktivier[e] die Szene {name}"
    domains:
      - "scene"

  # timers
  - "[<timer_set> ein[en]] {seconds} Sekunden Timer"
  - "[<timer_set> ein[en]] {minutes} Minuten Timer"
  - "[<timer_set> ein[en]] {hours} Stunden Timer"
  - "[<timer_set> ein[en]] Timer (auf|für) {seconds} Sekunden"
  - "[<timer_set> ein[en]] Timer (auf|für) 1 Minute"
  - "[<timer_set> ein[en]] Timer (auf|für) {minutes} Minuten"
  - "[<timer_set> ein[en]] Timer (auf|für) 1 Stunde"
  - "[<timer_set> ein[en]] Timer (auf|für) {hours} Stunden"
  - "[<timer_set> ein[en]] Timer (auf|für) 1 Stunde und 1 Minute"
  - "[<timer_set> ein[en]] Timer (auf|für) 1 Stunde und {minutes} Minuten"
  - "[<timer_set> ein[en]] Timer (auf|für) {hours} Stunden und {minutes} Minuten"
  - "<timer_cancel> [(den|meinen)] Timer"
  - "<timer_cancel> (alle [meine]|sämtliche) Timer"
  - "pausiere [(den|meinen)] Timer"
  - "setze [(den|meinen)] Timer fort"
  - "Timer Status"
  - "Status (des|meines) Timers"
  - "wie lange läuft (der|mein) Timer noch"

  # media
  - "(pause|fortsetzen)"
  - "nächster [(Titel|Eintrag|Song)]"
  - "überspringe [[diesen] (Titel|Eintrag|Song)]"
  - sentences:
      - "(pause|fortsetzen) [den] {name}"
      - "nächster [(Titel|Eintrag|Song)] auf [dem] {name}"
      - "überspringe [[den] (Titel|Eintrag|Song)] auf [dem] {name}"
    domains:
      - "media_player"

  # temperature
  - "wie [(hoch|niedrig)] ist die Temperatur"
  - "wie [(hoch|niedrig)] ist die Temperatur <in_area>"
  - "wie [(hoch|niedrig)] ist die {area} Temperatur"
  - sentences:
      - "wie (warm|kalt) ist es [hier]"
      - "wie (warm|kalt) ist [(der|die|das)] {name}"  
    domains:
      - "climate"

  # sensors
  - sentences:
      - "worauf steht {name}"
      - "wieviel (zeigt|ist) {name}"
      - "(wie [(hoch|niedrig)]|was) ist der {name} Wert"
      - "(wie [(hoch|niedrig)]|was) ist der Wert von [der|dem] {name}"
    domains:
      - "sensor"

  # todo
  - sentences:
      - "füg[e] {todo_item} der {name} [Liste] hinzu"
      - "füg[e] {todo_item} auf [die] {name} [Liste] hinzu"
      - "füg[e] {todo_item} auf [die] [Liste] {name} hinzu"
      - "setz[e] {todo_item} auf [die] {name} [Liste]"
      - "setz[e] {todo_item} auf [die] [Liste] {name}"
    domains:
      - "todo"
